services:
  # ─── AI Inference ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hermes-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # /api/version returns 200; bare / returns 404 and would hang the stack.
      test: ["CMD-SHELL", "ollama --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles: ["full", "gpu", "basic"]

  # ─── Chat Interface ────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hermes-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY must be set - run setup.sh}
    depends_on:
      ollama:
        condition: service_healthy
    profiles: ["full", "gpu", "basic"]

  # ─── Agent Orchestration ───────────────────────────
  hermes:
    build:
      context: ./hermes-agent
    image: hermes-box/agent:local
    container_name: hermes-core
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./config/hermes.yaml:/etc/hermes/config.yaml:ro
      - hermes_data:/var/lib/hermes
    environment:
      - HERMES_CONFIG=/etc/hermes/config.yaml
      - OLLAMA_BASE_URL=http://ollama:11434
      - RAG_URL=http://rag:8002
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ALLOWED_TELEGRAM_IDS=${ALLOWED_TELEGRAM_IDS:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8787/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      ollama:
        condition: service_healthy
    profiles: ["full", "gpu", "basic"]

  # ─── RAG: chat over your own documents ─────────────
  rag:
    build:
      context: ./rag
    image: hermes-box/rag:local
    container_name: hermes-rag
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./documents:/data/documents:ro
      - rag_data:/var/lib/rag
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
    depends_on:
      ollama:
        condition: service_healthy
    profiles: ["full", "gpu", "basic"]

  # ─── VPN Gateway (Tailscale sidecar) ───────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: hermes-vpn
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_HOSTNAME=hermes-box
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    volumes:
      - tailscale_data:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
    profiles: ["full", "gpu", "basic"]

volumes:
  ollama_data:
  webui_data:
  hermes_data:
  rag_data:
  tailscale_data:
